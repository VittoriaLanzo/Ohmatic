# Component Registry — Ohmatic Stage 1+
#
# Single source of truth for component type metadata.
# Each section name matches the serde snake_case output of ComponentType.
# Fields:
#   bbox        = [width, height]  canvas units, used by Tier 2 AABB collision
#   ref_prefix  = "R"              reference designator prefix (IEEE 315 convention)
#   description = "..."            one-line human description
#
# To add a new type: see §9 of shared/docs/contracts.md.

[defaults]
bbox = [12, 12]

# ── Passives ──────────────────────────────────────────────────────────────────

[resistor]
bbox        = [8, 4]
ref_prefix  = "R"
description = "Fixed-value resistor; pins 1, 2 (passive, no polarity)"
parts_list_part = "resistor"
is_physical     = true

[capacitor]
bbox        = [8, 4]
ref_prefix  = "C"
description = "Capacitor (ceramic, electrolytic, film, tantalum)"
parts_list_part = "capacitor"
