    <radialGradient id="vbr" cx="86%" cy="96%" r="55%"><stop offset="0%" stop-color="#c47a3d" stop-opacity="0.10"/><stop offset="60%" stop-color="#c47a3d" stop-opacity="0"/></radialGradient>
    <pattern id="scan" width="6" height="5" patternUnits="userSpaceOnUse"><rect width="6" height="1" fill="#ffffff" fill-opacity="0.018"/></pattern>
  </defs>

