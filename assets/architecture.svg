  <rect x="6" y="6" width="988" height="388" rx="18" fill="url(#vtl)"/>
  <rect x="6" y="6" width="988" height="388" rx="18" fill="url(#vbr)"/>
  <rect x="6" y="6" width="988" height="388" rx="18" fill="url(#scan)"/>
  <rect x="6" y="6" width="988" height="388" rx="18" fill="none" stroke="#14302a" stroke-width="3"/>
  <rect x="18" y="18" width="964" height="364" rx="11" fill="none" stroke="#c47a3d" stroke-opacity="0.30" stroke-width="1"/>

