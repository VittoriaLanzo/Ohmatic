<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" role="img" aria-label="Ohmatic pipeline as a Copper Cartridge printed circuit board with four orange mounting holes. A gold PROMPT edge connector feeds copper signal traces through NORMALIZE (T5), GENERATE (Qwen3-8B), VERIFY (ERC) and out to DELIVER (JSON). An amber dashed self-correction loop routes Verify back to Generate on failure, up to 3 rounds; a red dashed killswitch branch drops from the loop when retries are exhausted and asks the user to clarify.">
  <defs>
    <style>
@font-face{font-family:'Silkscreen';font-style:normal;font-weight:400;src:url(data:font/woff2;base64,) format('woff2');}
text{font-family:'Silkscreen','Courier New',monospace;}
    </style>
