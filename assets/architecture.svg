  <g fill="#ffd072"><circle cx="121" cy="131" r="2.4"/><circle cx="351" cy="131" r="2.4"/><circle cx="581" cy="131" r="2.4"/><circle cx="811" cy="131" r="2.4"/></g>

  <g fill="#ffd072"><circle cx="102" cy="155" r="3.4"/><circle cx="248" cy="155" r="3.4"/><circle cx="332" cy="155" r="3.4"/><circle cx="478" cy="155" r="3.4"/><circle cx="562" cy="155" r="3.4"/><circle cx="708" cy="155" r="3.4"/><circle cx="792" cy="155" r="3.4"/><circle cx="938" cy="155" r="3.4"/></g>

